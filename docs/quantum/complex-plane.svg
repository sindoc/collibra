<?xml version="1.0" encoding="UTF-8"?>
<!--
  complex-plane.svg
  Complex Cartesian plane: unit circle, cosine similarity, quantum vectors.
  cosine().similarity().complex().resolve().xml().catalog().collibra()
  Grammar: docs/xml/chip-queries.xml
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:math="http://www.w3.org/1998/Math/MathML"
     viewBox="-200 -200 520 480"
     width="520" height="480"
     font-family="'Latin Modern Math', 'STIX Two Math', 'DejaVu Serif', serif"
     font-size="13">

  <defs>
    <!-- Arrow markers -->
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0057B8"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7B2FBE"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E05C00"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#238636"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="-200" y="-200" width="520" height="480" fill="#fafbfc" rx="8"/>

  <!-- Grid (light) -->
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="-170" y1="-160" x2="-170" y2="240"/>
    <line x1="-120" y1="-160" x2="-120" y2="240"/>
    <line x1="-70"  y1="-160" x2="-70"  y2="240"/>
    <line x1="30"   y1="-160" x2="30"   y2="240"/>
    <line x1="80"   y1="-160" x2="80"   y2="240"/>
    <line x1="130"  y1="-160" x2="130"  y2="240"/>
    <line x1="180"  y1="-160" x2="180"  y2="240"/>
    <line x1="-170" y1="-160" x2="290" y2="-160"/>
    <line x1="-170" y1="-110" x2="290" y2="-110"/>
    <line x1="-170" y1="-60"  x2="290" y2="-60"/>
    <line x1="-170" y1="40"   x2="290" y2="40"/>
    <line x1="-170" y1="90"   x2="290" y2="90"/>
    <line x1="-170" y1="140"  x2="290" y2="140"/>
    <line x1="-170" y1="190"  x2="290" y2="190"/>
  </g>

  <!-- Unit circle  (radius=120) centered at (0,0) -->
  <circle cx="0" cy="0" r="120"
          fill="none" stroke="#0057B8" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Axes -->
  <line x1="-180" y1="0" x2="290" y2="0"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="0" y1="220" x2="0" y2="-185"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Axis labels -->
  <text x="295" y="5" fill="#333" font-size="15">Re</text>
  <text x="6" y="-188" fill="#333" font-size="15">Im</text>

  <!-- Tick marks and unit labels -->
  <g stroke="#555" stroke-width="1" fill="#555" font-size="11">
    <line x1="120" y1="-5" x2="120" y2="5"/>
    <text x="116" y="18">1</text>
    <line x1="-120" y1="-5" x2="-120" y2="5"/>
    <text x="-130" y="18">−1</text>
    <line x1="-5" y1="-120" x2="5" y2="-120"/>
    <text x="9" y="-115">i</text>
    <line x1="-5" y1="120" x2="5" y2="120"/>
    <text x="9" y="124">−i</text>
  </g>

  <!-- ── Vector u (angle 22°, magnitude 0.80) ─────────────────────────── -->
  <!-- u = 0.80 * 120 = 96, angle 22deg -->
  <!-- ux = 96*cos(22°)=89.0, uy = -96*sin(22°)=-35.97 -->
  <line x1="0" y1="0" x2="89" y2="-36"
        stroke="#E05C00" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <text x="94" y="-38" fill="#E05C00" font-style="italic" font-weight="bold">u</text>

  <!-- ── Vector v (angle 58°, magnitude 1.0) ──────────────────────────── -->
  <!-- v = 120, angle 58deg -->
  <!-- vx = 120*cos(58°)=63.6, vy = -120*sin(58°)=-101.8 -->
  <line x1="0" y1="0" x2="64" y2="-102"
        stroke="#7B2FBE" stroke-width="2.5" marker-end="url(#arr-violet)"/>
  <text x="68" y="-106" fill="#7B2FBE" font-style="italic" font-weight="bold">v</text>

  <!-- ── Angle θ between u and v ─────────────────────────────────────── -->
  <!-- Arc from 22° to 58°, radius 48 -->
  <!-- Start: 48*cos(22°)=44.5, -48*sin(22°)=-18.0 -->
  <!-- End:   48*cos(58°)=25.4, -48*sin(58°)=-40.7 -->
  <path d="M 44,−18 A 48,48 0 0,1 25,−41"
        fill="none" stroke="#C8A400" stroke-width="2"/>
  <text x="52" y="-30" fill="#C8A400" font-size="13" font-style="italic">θ</text>

  <!-- ── cos(θ) annotation ─────────────────────────────────────────────── -->
  <!-- θ = 36°, cos(36°)=0.809 → x=97.1 on Re axis -->
  <!-- Projection of v onto Re axis: vx=64 -->
  <line x1="64" y1="-102" x2="64" y2="0"
        stroke="#238636" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="30" y="18" fill="#238636" font-size="12">cos θ</text>
  <line x1="0" y1="0" x2="64" y2="0"
        stroke="#238636" stroke-width="2" stroke-dasharray="none" opacity="0.5"/>

  <!-- ── sin(θ) annotation ─────────────────────────────────────────────── -->
  <line x1="64" y1="-102" x2="0" y2="-102"
        stroke="#cc3333" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="-55" y="-100" fill="#cc3333" font-size="12">sin θ</text>

  <!-- ── cosine similarity label ──────────────────────────────────────── -->
  <rect x="-185" y="-195" width="490" height="28" rx="4"
        fill="#0057B8" opacity="0.08"/>
  <text x="-175" y="-175" fill="#0057B8" font-size="12" font-weight="bold">
    cos_sim(u,v) = Re⟨u,v⟩ / (|u|·|v|) = cos θ
  </text>

  <!-- ── Euler formula box ─────────────────────────────────────────────── -->
  <rect x="140" y="-195" width="165" height="52" rx="4"
        fill="#7B2FBE" opacity="0.07"/>
  <text x="150" y="-175" fill="#7B2FBE" font-size="12">
    z = r e^{iθ} = r(cos θ + i sin θ)
  </text>
  <text x="158" y="-158" fill="#7B2FBE" font-size="12">
    e^{iπ} + 1 = 0
  </text>

  <!-- ── Quantum state label ───────────────────────────────────────────── -->
  <text x="-185" y="250" fill="#555" font-size="11">
    |ψ⟩ = Σ αₖ|k⟩  ·  â†|n⟩ = √(n+1)|n+1⟩  ·  [â,â†] = 1̂
  </text>

  <!-- ── Chain label ───────────────────────────────────────────────────── -->
  <text x="-185" y="270" fill="#0057B8" font-size="10.5" font-style="italic">
    cosine().similarity().complex().resolve().xml().catalog().collibra()
  </text>

  <!-- ── Code table strip ──────────────────────────────────────────────── -->
  <rect x="-185" y="285" width="490" height="22" rx="3"
        fill="#C8A400" opacity="0.12"/>
  <text x="-175" y="301" fill="#7B5800" font-size="11" font-family="monospace">
    AAAA·BBBB·CCCC·DDDD·EEEE·FFFFF  ← loadCodeTableFromBaseFromShiva()
  </text>

  <!-- ── bubbleLeader chain label ─────────────────────────────────────── -->
  <text x="-185" y="328" fill="#333" font-size="10.5" font-family="monospace">
    Ξ = bubbleLeader·builder·piotr·groovy·clojure·c·f·math·godel·escher·pg·pg·paulGraham
  </text>

  <!-- Origin dot -->
  <circle cx="0" cy="0" r="3.5" fill="#333"/>
  <text x="5" y="-6" fill="#333" font-size="11">O</text>

</svg>
