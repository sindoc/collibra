# conf.d/collibra-upstream.cloud.conf — CDN config for cloud-connected edge
#
# Used by docker-compose.cloud.yml (no local collibra-edge container).
# All traffic flows through edge-site:8080; /rest/ and /graphql/ return 502
# with a redirect hint — the DGC REST API is on lutino.collibra.com directly.

# ── Upstreams ─────────────────────────────────────────────────────────────────

upstream edge_site {
    server edge-site:8080;
    keepalive 16;
}

# ── HTTPS vhost ───────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /opt/edge/cdn/certs/server.crt;
    ssl_certificate_key /opt/edge/cdn/certs/server.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Edge Site health probe ────────────────────────────────────────────────
    location = /health {
        proxy_pass  http://edge_site;
        proxy_cache off;
        access_log  off;
    }

    # ── Edge Site REST API — never cache ─────────────────────────────────────
    location ^~ /api/edge/ {
        proxy_pass  http://edge_site;
        proxy_cache off;
    }

    # ── Dated session pages — clean URL /YYYY-MM-DD/ → /site/YYYY-MM-DD/index.html
    location ~ "^/([0-9]{4}-[0-9]{2}-[0-9]{2})/?$" {
        return 301 /site/$1/index.html;
    }

    # ── Edge Site static web content — CDN-cacheable ─────────────────────────
    location ^~ /site/ {
        proxy_pass         http://edge_site;
        proxy_cache        cdn_cache;
        proxy_cache_valid  200 302  30m;
        proxy_cache_valid  404      1m;
        proxy_cache_bypass $http_cache_control;
        add_header         X-Cache-Status $upstream_cache_status;
    }

    # ── Collibra REST/GraphQL — not served locally in cloud mode ─────────────
    # Access the DGC REST API directly at https://lutino.collibra.com/rest/
    location ~ ^/(rest|graphql)/ {
        return 404 '{"error":"DGC REST API not proxied in cloud mode","dgc":"https://lutino.collibra.com"}';
        add_header Content-Type application/json;
    }

    # ── Default: route to edge site ──────────────────────────────────────────
    location / {
        proxy_pass         http://edge_site;
        proxy_cache        cdn_cache;
        proxy_cache_valid  200 302  10m;
        proxy_cache_valid  404      1m;
        proxy_cache_bypass $http_cache_control;
        add_header         X-Cache-Status $upstream_cache_status;
    }
}
