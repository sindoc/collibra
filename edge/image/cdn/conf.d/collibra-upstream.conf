# conf.d/collibra-upstream.conf — Collibra edge upstream and vhost
#
# Replace COLLIBRA_EDGE_HOSTNAME with the actual FQDN or use the Docker
# Compose service name 'collibra-edge' for local development.
#
# TLS certs must be present at:
#   /opt/edge/cdn/certs/server.crt
#   /opt/edge/cdn/certs/server.key

# ── Upstreams ─────────────────────────────────────────────────────────────────

upstream collibra_edge {
    server collibra-edge:7080;
    keepalive 16;
}

upstream edge_site {
    server edge-site:8080;
    keepalive 16;
}

# ── HTTPS vhost ───────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /opt/edge/cdn/certs/server.crt;
    ssl_certificate_key /opt/edge/cdn/certs/server.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Edge Site health probe (unrouted shortcut) ────────────────────────────
    location = /health {
        proxy_pass  http://edge_site;
        proxy_cache off;
        access_log  off;
    }

    # ── Edge Site REST API — never cache ─────────────────────────────────────
    location ^~ /api/edge/ {
        proxy_pass  http://edge_site;
        proxy_cache off;
    }

    # ── Dated session pages — clean URL: /2026-03-21/ → /site/2026-03-21/index.html
    location ~ "^/([0-9]{4}-[0-9]{2}-[0-9]{2})/?$" {
        return 301 /site/$1/index.html;
    }

    # ── Edge Site static web content — CDN-cacheable ─────────────────────────
    location ^~ /site/ {
        proxy_pass         http://edge_site;
        proxy_cache        cdn_cache;
        proxy_cache_valid  200 302  30m;
        proxy_cache_valid  404      1m;
        proxy_cache_bypass $http_cache_control;
        add_header         X-Cache-Status $upstream_cache_status;
    }

    # ── Collibra REST API — never cache ──────────────────────────────────────
    location ~ ^/rest/ {
        proxy_pass  http://collibra_edge;
        proxy_cache off;
    }

    # ── Collibra GraphQL — never cache ───────────────────────────────────────
    location ~ ^/graphql/ {
        proxy_pass  http://collibra_edge;
        proxy_cache off;
    }

    # ── Default: route to edge site (serves index.html and other site assets) -
    location / {
        proxy_pass         http://edge_site;
        proxy_cache        cdn_cache;
        proxy_cache_valid  200 302  10m;
        proxy_cache_valid  404      1m;
        proxy_cache_bypass $http_cache_control;
        add_header         X-Cache-Status $upstream_cache_status;
    }
}
