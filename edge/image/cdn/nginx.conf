# nginx.conf — CentOS 7 LTS edge CDN base configuration
#
# Runs as the 'edge' (non-root) user.
# Per-service upstreams and vhosts live in conf.d/.

user edge edge;
worker_processes auto;
error_log /opt/edge/cdn/logs/error.log warn;
pid       /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /opt/edge/cdn/logs/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;

    # ── TLS defaults ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Proxy defaults ────────────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_connect_timeout   10s;
    proxy_read_timeout      60s;
    proxy_send_timeout      60s;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;

    # ── Cache zone for CDN responses ─────────────────────────────────────────
    proxy_cache_path /opt/edge/cdn/cache
                     levels=1:2
                     keys_zone=cdn_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ── Health endpoint (internal) ───────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
